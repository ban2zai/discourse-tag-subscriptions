plugins:
  tag_subscriptions_enabled:
    default: true
    client: true
    type: bool
    description:
      en: "Enable tag subscriptions UI in user preferences"
      ru: "Включить UI подписок на теги в настройках пользователя"

  tag_subscription_groups:
    client: true
    type: list
    list_type: simple
    allow_any: true
    default: ""
    description:
      en: "Pipe-separated names of tag groups to show in the subscription UI"
      ru: "Имена групп тегов через | для отображения в UI подписок"

  tag_subscription_level1_color:
    client: true
    type: string
    default: "#e5b000"
    description:
      en: "Color (hex) for watching_first_post level"
      ru: "Цвет (hex) для уровня watching_first_post"

  tag_subscription_level2_color:
    client: true
    type: string
    default: "#cc5500"
    description:
      en: "Color (hex) for watching level"
      ru: "Цвет (hex) для уровня watching"

  tag_subscription_pinned_tags:
    client: true
    type: string
    default: ""
    description:
      en: "Pipe-separated tag slugs to show at the top before all groups"
      ru: "Теги через | для отображения вверху перед всеми группами"

  tag_subscription_help_topic_url:
    client: true
    type: string
    default: ""
    description:
      en: "URL to the topic with notification instructions (shown as a link above the hint)"
      ru: "Ссылка на тему с инструкцией по уведомлениям (отображается над подсказкой)"

  tag_subscription_help_link_label:
    client: true
    type: string
    default: "Инструкция для уведомлений"
    description:
      en: "Label for the instructions link"
      ru: "Текст ссылки на инструкцию"

  tag_subscription_hint:
    client: true
    type: string
    default: ""
    description:
      en: "Custom hint text (leave empty for default with color squares)"
      ru: "Свой текст подсказки (оставьте пустым для дефолтного с цветными квадратиками)"
