plugins:
  tag_subscriptions_enabled:
    default: true
    client: true
    type: bool
    description:
      en: "Enable tag subscriptions UI in user preferences"
      ru: "Включить UI подписок на теги в настройках пользователя"

  tag_subscription_groups:
    client: true
    type: list
    list_type: simple
    allow_any: true
    default: ""
    description:
      en: "Pipe-separated names of tag groups to show in the subscription UI"
      ru: "Имена групп тегов через | для отображения в UI подписок"

  tag_subscription_level1_color:
    client: true
    type: string
    default: "#e5b000"
    description:
      en: "Color (hex) for watching_first_post level"
      ru: "Цвет (hex) для уровня watching_first_post"

  tag_subscription_level2_color:
    client: true
    type: string
    default: "#cc5500"
    description:
      en: "Color (hex) for watching level"
      ru: "Цвет (hex) для уровня watching"

  tag_subscription_level1_label:
    client: true
    type: string
    default: "Уведомление о новой теме с тегом"
    description:
      en: "Legend label for watching_first_post level"
      ru: "Подпись в легенде для уровня watching_first_post"

  tag_subscription_level2_label:
    client: true
    type: string
    default: "Уведомление о каждом ответе в теме с тегом"
    description:
      en: "Legend label for watching level"
      ru: "Подпись в легенде для уровня watching"

  tag_subscription_pinned_tags:
    client: true
    type: string
    default: ""
    description:
      en: "Pipe-separated tag slugs to show at the top before all groups"
      ru: "Теги через | для отображения вверху перед всеми группами"

  tag_subscription_hint:
    client: true
    type: string
    default: "Нажмите 1 раз — только новые темы, 2 раза — все ответы, 3 раза — отменить"
    description:
      en: "Hint text explaining click cycling"
      ru: "Текст подсказки о переключении уровня кликом"
