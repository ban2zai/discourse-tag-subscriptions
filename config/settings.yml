plugins:
  tag_subscription_groups:
    client: true
    type: list
    list_type: simple
    allow_any: true
    default: ""
    description:
      en: "Pipe-separated names of tag groups to show in the subscription UI (e.g. БГУ Разделы|ЗГУ Разделы)"
      ru: "Имена групп тегов через | для отображения в UI подписок (например: БГУ Разделы|ЗГУ Разделы)"

  tag_subscription_notification_level:
    client: true
    type: enum
    default: watching_first_post
    choices:
      - watching_first_post
      - watching
      - tracking
    description:
      en: "Notification level applied when subscribing to tags: watching_first_post = new topics only, watching = all replies, tracking = unread count"
      ru: "Уровень уведомлений при подписке на теги: watching_first_post = новые темы, watching = все ответы, tracking = счётчик непрочитанных"
